services:
  - type: web
    name: civic-authority-api
    runtime: node
    region: singapore
    branch: main
    buildCommand: npm install
    startCommand: npm run dev
    envVars:
      - key: PORT
        value: 3000
      - key: JWT_SECRET
        value: civic2024secretkey
      - key: MONGODB_URI
        sync: false
      - key: FRONTEND_URL
        value: https://the-civic-authority-theta.vercel.app
